name: Weekly Wildlife Cache Rebuild

# Refreshes the static wildlife cache every Sunday at 06:00 UTC.
# The job rebuilds from eBird + iNaturalist + NPS, expands photos,
# runs a sanity check on species counts, and pushes directly to main
# if the bundle is healthy. Vercel auto-deploys on push.
#
# Manual trigger: Actions tab → "Run workflow" (option to force PR mode).

on:
  schedule:
    - cron: "0 6 * * 0"   # every Sunday 06:00 UTC
  workflow_dispatch:       # manual trigger
    inputs:
      parks:
        description: "Comma-separated park IDs to rebuild (leave blank for full)"
        required: false
        default: ""
      skip_enrich:
        description: "Skip slow description enrichment step"
        required: false
        type: boolean
        default: false
      pr_mode:
        description: "Open a PR instead of pushing to main (override auto-merge)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 420      # hard cap 7 h — rebuild can run ~4 h, enrichment ~1 h

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Snapshot the current species count so we can verify the rebuild
      # didn't accidentally wipe out a chunk of data (e.g. eBird API outage).
      - name: Snapshot pre-rebuild species count
        id: pre_count
        run: |
          # Sum animal entries across all wildlifeCache* data files.
          PRE=$(grep -h '"scientificName"' src/data/wildlifeCache*.js 2>/dev/null | wc -l)
          echo "pre=$PRE" >> "$GITHUB_OUTPUT"
          echo "Pre-rebuild species entries: $PRE"

      - name: Rebuild wildlife cache
        env:
          # buildWildlifeCache.js reads VITE_* prefixed names (matching .env);
          # provide both naming conventions so either secret name works.
          VITE_EBIRD_API_KEY: ${{ secrets.EBIRD_KEY }}
          VITE_NPS_API_KEY:   ${{ secrets.NPS_KEY }}
          EBIRD_KEY:          ${{ secrets.EBIRD_KEY }}
          NPS_KEY:            ${{ secrets.NPS_KEY }}
          PARKS:              ${{ github.event.inputs.parks }}
        run: node scripts/buildWildlifeCache.js

      - name: Split primary / secondary caches
        run: node scripts/splitCache.js

      - name: Enrich placeholder descriptions
        if: ${{ github.event.inputs.skip_enrich != 'true' }}
        continue-on-error: true
        run: node scripts/enrichDescriptions.js

      - name: Expand bundled photos
        continue-on-error: true
        run: node scripts/expandPhotos.mjs

      - name: Verify production build
        run: npm run build

      # Sanity check with graceful degradation:
      #   drop ≤10%      → ship (auto-merge to main)
      #   drop 10-25%    → soft-fail (open PR for human review instead)
      #   drop >25%      → hard-fail (likely API outage — abandon run)
      # Catches partial API failures, rate limit lockouts, and mid-rebuild
      # crashes that produce a smaller but technically valid cache.
      - name: Validate species count
        id: validate
        run: |
          POST=$(grep -h '"scientificName"' src/data/wildlifeCache*.js 2>/dev/null | wc -l)
          PRE=${{ steps.pre_count.outputs.pre }}
          echo "Post-rebuild species entries: $POST"
          echo "post=$POST" >> "$GITHUB_OUTPUT"
          NEEDS_REVIEW=false
          DROP_PCT=0
          if [ "$PRE" -gt 0 ]; then
            DROP_PCT=$(awk -v p="$PRE" -v q="$POST" 'BEGIN{printf "%.1f", (p-q)*100/p}')
            echo "Drop: ${DROP_PCT}%"
            if awk -v d="$DROP_PCT" 'BEGIN{exit !(d > 25)}'; then
              echo "::error::Rebuild dropped ${DROP_PCT}% of species (was $PRE, now $POST). Hard-fail — likely API outage."
              exit 1
            fi
            if awk -v d="$DROP_PCT" 'BEGIN{exit !(d > 10)}'; then
              echo "::warning::Rebuild dropped ${DROP_PCT}% of species (was $PRE, now $POST). Soft-fail — opening PR for human review instead of auto-merging."
              NEEDS_REVIEW=true
            fi
          fi
          echo "drop_pct=$DROP_PCT" >> "$GITHUB_OUTPUT"
          echo "needs_review=$NEEDS_REVIEW" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet src/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          fi

      # Auto-push to main when running on schedule, or when manually
      # triggered without pr_mode. Vercel picks up the push and redeploys.
      # Skipped when validate flagged the rebuild for human review.
      - name: Auto-merge to main
        if: |
          steps.diff.outputs.changed == 'true' &&
          steps.validate.outputs.needs_review != 'true' &&
          github.event.inputs.pr_mode != 'true'
        env:
          PRE:  ${{ steps.pre_count.outputs.pre }}
          POST: ${{ steps.validate.outputs.post }}
          DROP: ${{ steps.validate.outputs.drop_pct }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data
          git commit -m "chore(data): weekly wildlife cache rebuild

          Automated weekly rebuild from eBird + iNaturalist + NPS.
          Pre-rebuild species: $PRE
          Post-rebuild species: $POST
          Net drop: ${DROP}% (sanity-check threshold 10%)"
          git push origin main

      # Open a PR when (a) explicitly requested via workflow_dispatch, or
      # (b) the species drop is in the soft-fail review band (10–25%).
      - name: Open pull request
        if: |
          steps.diff.outputs.changed == 'true' &&
          (github.event.inputs.pr_mode == 'true' ||
           steps.validate.outputs.needs_review == 'true')
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automated/weekly-rebuild
          title: "chore(data): weekly wildlife cache rebuild (review needed)"
          commit-message: "chore(data): weekly wildlife cache rebuild"
          body: |
            Automated weekly rebuild — opened as PR instead of auto-merged.

            **Reason:** ${{ steps.validate.outputs.needs_review == 'true' && format('species count dropped {0}% (auto-merge threshold is 10%)', steps.validate.outputs.drop_pct) || 'pr_mode=true requested manually' }}

            - Rebuilt species lists from eBird + iNaturalist + NPS.
            - Enriched placeholder descriptions.
            - Expanded bundled photo coverage.
            - Verified production build passes.
            - Species count: ${{ steps.pre_count.outputs.pre }} → ${{ steps.validate.outputs.post }} (drop ${{ steps.validate.outputs.drop_pct }}%)

            Inspect the diff. If the drop reflects a legitimate cleanup or a recoverable API hiccup, merge. Otherwise close and let next Sunday's run try again.
          labels: |
            automated
            data-refresh
