<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OG Image Preview — 1200x630</title>
<style>
  html,body{margin:0;padding:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',-apple-system,system-ui,sans-serif}
  .card{width:1200px;height:630px;position:relative;overflow:hidden;background:linear-gradient(180deg,#0c3823 0%,#1a5c38 100%);color:#fff}
  .topo{position:absolute;inset:0;opacity:.06;background-image:
    radial-gradient(circle at 20% 80%, transparent 58%, #fff 59%, transparent 60%),
    radial-gradient(circle at 50% 95%, transparent 65%, #fff 66%, transparent 67%),
    radial-gradient(circle at 80% 78%, transparent 55%, #fff 56%, transparent 57%)}
  .leaf{position:absolute;top:52px;left:72px;font-size:56px}
  .pin{position:absolute;width:72px;height:72px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .p1{top:170px;left:170px} .p2{top:140px;right:190px}
  .p3{bottom:170px;right:120px} .p4{bottom:160px;left:110px}
  .title{position:absolute;left:0;right:0;top:240px;text-align:center;font-size:84px;font-weight:800;letter-spacing:-1px;line-height:1}
  .sub{position:absolute;left:0;right:0;top:350px;text-align:center;font-size:34px;font-weight:500;color:#d8efd8}
  .url{position:absolute;left:50%;top:445px;transform:translateX(-50%);background:#fff;color:#0c3823;padding:18px 56px;border-radius:40px;font-weight:700;font-size:26px;letter-spacing:.2px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
</style>
</head>
<body>
  <div class="card">
    <div class="topo"></div>
    <div class="leaf">🌿</div>
    <div class="pin p1">🦬</div>
    <div class="pin p2">🦅</div>
    <div class="pin p3">🐻</div>
    <div class="pin p4">🐺</div>
    <div class="title">US Wildlife Explorer</div>
    <div class="sub">63 national parks · 32,000+ species · live rarity data</div>
    <div class="url">wildlifeexplorer.us</div>
  </div>
</body>
</html>
